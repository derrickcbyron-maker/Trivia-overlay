<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Derrick C Byron 24/7 Trivia Overlay</title>
  <style>
    :root{
      --panel-bg: rgba(16, 20, 28, 0.78);
      --panel-border: rgba(255,255,255,0.12);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.65);
      --good: rgba(95, 225, 165, .22);
      --bad: rgba(255, 95, 110, .18);
      --goodLine: rgba(95, 225, 165, .55);
      --badLine: rgba(255, 95, 110, .50);
      --bar: rgba(160, 190, 255, 0.85);
    }

    html,body{
      height:100%;
      margin:0;
      background:transparent;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .wrap{
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      box-sizing:border-box;
    }

    .panel{
      width:min(1180px, 96vw);
      border-radius:18px;
      background: var(--panel-bg);
      border:1px solid var(--panel-border);
      box-shadow: 0 18px 55px rgba(0,0,0,0.35);
      overflow:hidden;
      backdrop-filter: blur(10px);
    }

    .top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
      padding:16px 18px 10px 18px;
    }

    .brand{
      color: var(--muted);
      font-size:13px;
      letter-spacing:0.2px;
      line-height:1.2;
    }

    .status{
      margin-top:4px;
      color: rgba(255,255,255,0.62);
      font-size:12px;
    }

    .chips{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:flex-end;
    }

    .chip{
      color: rgba(255,255,255,0.84);
      font-size:12px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--panel-border);
      background: rgba(255,255,255,0.06);
      user-select:none;
      white-space:nowrap;
    }

    .q{
      padding:0 18px 10px 18px;
      color: var(--text);
      font-size:42px;
      font-weight:800;
      line-height:1.05;
      letter-spacing:-0.6px;
      min-height:94px;
    }

    .answers{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
      padding:10px 18px 16px 18px;
    }

    .ans{
      border-radius:14px;
      border:1px solid var(--panel-border);
      background: rgba(255,255,255,0.06);
      padding:14px 14px;
      color: rgba(255,255,255,0.92);
      display:flex;
      gap:12px;
      align-items:center;
      font-size:18px;
      min-height:56px;
      box-sizing:border-box;
    }

    .badge{
      width:28px;
      height:28px;
      border-radius:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      font-size:12px;
      border:1px solid var(--panel-border);
      background: rgba(0,0,0,0.18);
      flex:0 0 auto;
    }

    .ans.good{
      background: linear-gradient(0deg, var(--good), rgba(255,255,255,0.06));
      border-color: var(--goodLine);
    }
    .ans.bad{
      background: linear-gradient(0deg, var(--bad), rgba(255,255,255,0.06));
      border-color: var(--badLine);
    }

    .bottom{
      padding:0 18px 16px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .hint{
      color: rgba(255,255,255,0.60);
      font-size:12px;
      white-space:nowrap;
    }

    .bar{
      flex:1 1 auto;
      height:8px;
      border-radius:999px;
      overflow:hidden;
      border:1px solid var(--panel-border);
      background: rgba(255,255,255,0.06);
    }

    .fill{
      height:100%;
      width:0%;
      background: linear-gradient(90deg, rgba(120,210,255,.90), rgba(200,120,255,.80));
      border-radius:999px;
    }

    .tiny{
      color: rgba(255,255,255,0.55);
      font-size:12px;
      white-space:nowrap;
    }

    .error{
      display:none;
      padding:12px 18px 16px 18px;
      border-top:1px solid var(--panel-border);
      background: rgba(255, 95, 110, 0.12);
      color: rgba(255,255,255,0.9);
      font-size:13px;
      line-height:1.3;
    }
    .error b{ color: rgba(255, 95, 110, 0.95); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="top">
        <div>
          <div class="brand">Derrick C Byron Cinematic Trivia</div>
          <div class="status" id="statusLine">Starting</div>
        </div>
        <div class="chips">
          <div class="chip" id="catChip">Category</div>
          <div class="chip" id="countChip">0</div>
          <div class="chip" id="bufferChip">Buffer 0</div>
        </div>
      </div>

      <div class="q" id="questionText">Loading</div>

      <div class="answers" id="answers">
        <div class="ans"><div class="badge">A</div><div>Loading</div></div>
        <div class="ans"><div class="badge">B</div><div>Loading</div></div>
        <div class="ans"><div class="badge">C</div><div>Loading</div></div>
        <div class="ans"><div class="badge">D</div><div>Loading</div></div>
      </div>

      <div class="bottom">
        <div class="hint">Think of the answer</div>
        <div class="bar"><div class="fill" id="barFill"></div></div>
        <div class="tiny" id="phaseText">Reveal soon</div>
      </div>

      <div class="error" id="errorBox"></div>
    </div>
  </div>

  <!-- config (optional) -->
  <script src="./questions.js?v=1"></script>

  <script>
    // --------- Config (can be overridden by questions.js) ---------
    const CFG = Object.assign({
      thinkMs: 9000,
      revealMs: 2500,
      tickMs: 50,

      // Keeps a rolling buffer so it never hangs
      bufferTarget: 120,
      fetchBatch: 50,

      // Open Trivia DB endpoint (free, no key)
      apiBase: "https://opentdb.com/api.php",

      // If you want "real" categories, you can later add a dropdown and pass category IDs.
      // For now, we grab mixed categories.
      apiParams: {
        amount: 50,
        type: "multiple",
        encode: "url3986"
      },

      // Avoid repeats across time
      usedKey: "dcb_used_questions_v1",
      usedMax: 5000,

      // Counter shown to viewers
      counterPrefix: "Q",
      // Small on-screen credit to the data source (recommended for compliance)
      showAttributionInStatus: true
    }, window.DCB_TRIVIA_CONFIG || {});
    // ------------------------------------------------------------

    const elQ = document.getElementById("questionText");
    const elAnsWrap = document.getElementById("answers");
    const elCat = document.getElementById("catChip");
    const elCount = document.getElementById("countChip");
    const elBuf = document.getElementById("bufferChip");
    const elBar = document.getElementById("barFill");
    const elPhase = document.getElementById("phaseText");
    const elStatus = document.getElementById("statusLine");
    const elErr = document.getElementById("errorBox");
    const letters = ["A","B","C","D"];

    let shownCount = 0;

    function decode3986(s){
      try { return decodeURIComponent(String(s || "")); }
      catch { return String(s || ""); }
    }

    function shuffle(arr){
      for (let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function showError(msg){
      elErr.style.display = "block";
      elErr.innerHTML = "<b>Problem</b><br>" + msg;
      elStatus.textContent = "Error";
    }

    function loadUsedSet(){
      try{
        const raw = localStorage.getItem(CFG.usedKey);
        const arr = raw ? JSON.parse(raw) : [];
        if (!Array.isArray(arr)) return new Set();
        return new Set(arr);
      }catch{
        return new Set();
      }
    }

    function saveUsedSet(set){
      try{
        const arr = Array.from(set);
        // keep it bounded
        const trimmed = arr.slice(Math.max(0, arr.length - CFG.usedMax));
        localStorage.setItem(CFG.usedKey, JSON.stringify(trimmed));
      }catch{}
    }

    const used = loadUsedSet();
    const queue = [];

    function makeKey(q){
      return (q.category || "") + "|" + (q.question || "");
    }

    function normalizeApiItem(item){
      const category = decode3986(item.category);
      const question = decode3986(item.question);
      const correct = decode3986(item.correct_answer);
      const incorrect = (item.incorrect_answers || []).map(decode3986);

      const answers = shuffle([correct, ...incorrect]).slice(0,4);
      const correctIndex = answers.indexOf(correct);

      return {
        category,
        question,
        answers,
        correct: correctIndex < 0 ? 0 : correctIndex
      };
    }

    async function fetchBatch(){
      const url = new URL(CFG.apiBase);
      Object.entries(CFG.apiParams).forEach(([k,v]) => url.searchParams.set(k, v));

      const res = await fetch(url.toString(), { cache: "no-store" });
      if (!res.ok) throw new Error("API request failed: " + res.status);

      const data = await res.json();
      if (!data || !Array.isArray(data.results)) throw new Error("Bad API response");

      const items = data.results.map(normalizeApiItem);

      // filter repeats
      let added = 0;
      for (const q of items){
        const key = makeKey(q);
        if (used.has(key)) continue;
        used.add(key);
        queue.push(q);
        added++;
      }
      saveUsedSet(used);
      return added;
    }

    let fetching = false;
    async function topUp(){
      if (fetching) return;
      if (queue.length >= CFG.bufferTarget) return;

      fetching = true;
      try{
        elStatus.textContent = CFG.showAttributionInStatus
          ? "Auto trivia running (questions via Open Trivia DB)"
          : "Auto trivia running";

        // try a few times quickly to fill buffer
        let tries = 0;
        while (queue.length < CFG.bufferTarget && tries < 6){
          tries++;
          const added = await fetchBatch();
          // If added nothing (all repeats), keep trying
          if (added === 0) continue;
        }
      }catch(e){
        showError(String(e.message || e));
      }finally{
        fetching = false;
      }
    }

    function render(q){
      shownCount++;
      elCat.textContent = q.category || "Trivia";
      elCount.textContent = CFG.counterPrefix + " " + shownCount;
      elBuf.textContent = "Buffer " + queue.length;

      elQ.textContent = q.question || "Question";

      elAnsWrap.innerHTML = "";
      for (let i = 0; i < 4; i++){
        const div = document.createElement("div");
        div.className = "ans";
        const b = document.createElement("div");
        b.className = "badge";
        b.textContent = letters[i];
        const t = document.createElement("div");
        t.textContent = q.answers[i] || "";
        div.appendChild(b);
        div.appendChild(t);
        elAnsWrap.appendChild(div);
      }
      return q.correct || 0;
    }

    function clearHighlights(){
      elAnsWrap.querySelectorAll(".ans").forEach(x=>{
        x.classList.remove("good"); x.classList.remove("bad");
      });
    }

    function reveal(correctIndex){
      elAnsWrap.querySelectorAll(".ans").forEach((x,i)=>{
        if (i === correctIndex) x.classList.add("good");
        else x.classList.add("bad");
      });
    }

    function sleep(ms){ return new Promise(r=>setTimeout(r, ms)); }

    async function run(){
      await topUp();

      // If still empty, show a clear error
      if (queue.length === 0){
        showError("Queue is empty. The trivia API may be blocked by a network filter. Try again on a different network.");
        return;
      }

      while (true){
        await topUp();

        const q = queue.shift();
        if (!q) { await sleep(500); continue; }

        clearHighlights();
        elBar.style.width = "0%";
        elPhase.textContent = "Reveal soon";

        const correctIndex = render(q);

        const start = performance.now();
        while (performance.now() - start < CFG.thinkMs){
          const p = Math.min(1, (performance.now() - start) / CFG.thinkMs);
          elBar.style.width = (p * 100).toFixed(1) + "%";
          await sleep(CFG.tickMs);
        }

        reveal(correctIndex);
        elPhase.textContent = "Answer revealed";

        await sleep(CFG.revealMs);
      }
    }

    run();
  </script>
</body>
</html>
