<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Derrick C Byron Cinematic 24/7 Trivia</title>

  <style>
    :root{
      --panel-bg: rgba(25, 28, 35, 0.86);
      --panel-border: rgba(255,255,255,0.14);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.66);
      --chip-bg: rgba(255,255,255,0.10);
      --chip-border: rgba(255,255,255,0.14);
      --answer-bg: rgba(255,255,255,0.07);
      --answer-border: rgba(255,255,255,0.12);
      --correct: rgba(55, 210, 130, 0.30);
      --wrong: rgba(240, 80, 80, 0.26);
      --correct-border: rgba(55, 210, 130, 0.60);
      --wrong-border: rgba(240, 80, 80, 0.55);
      --bar-bg: rgba(255,255,255,0.10);
      --bar-fill-a: rgba(120, 200, 255, 0.92);
      --bar-fill-b: rgba(180, 120, 255, 0.92);
      --shadow: 0 16px 44px rgba(0,0,0,0.30);
      --radius: 18px;
    }

    html, body {
      height: 100%;
      margin: 0;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
    }

    .wrap{
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      box-sizing: border-box;
    }

    .panel{
      width: min(1300px, 96vw);
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 22px 22px 18px 22px;
      box-sizing: border-box;
    }

    .top{
      display:flex;
      align-items:flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 10px;
    }

    .brand{
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.2px;
      opacity: 0.95;
    }

    .sub{
      margin-top: 4px;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.25px;
    }

    .chips{
      display:flex;
      gap: 10px;
      align-items:center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chip{
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--chip-bg);
      border: 1px solid var(--chip-border);
      font-size: 12px;
      color: rgba(255,255,255,0.80);
      user-select: none;
      white-space: nowrap;
    }

    .question{
      font-size: clamp(30px, 3.6vw, 54px);
      font-weight: 800;
      line-height: 1.06;
      margin: 10px 0 16px 0;
      letter-spacing: 0.2px;
      text-shadow: 0 2px 16px rgba(0,0,0,0.35);
    }

    .answers{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 6px;
    }

    .answer{
      background: var(--answer-bg);
      border: 1px solid var(--answer-border);
      border-radius: 14px;
      padding: 14px 14px;
      display:flex;
      align-items:center;
      gap: 12px;
      min-height: 54px;
      box-sizing: border-box;
    }

    .badge{
      width: 28px;
      height: 28px;
      border-radius: 10px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight: 800;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.88);
      flex: 0 0 auto;
    }

    .answerText{
      font-size: 18px;
      font-weight: 600;
      color: rgba(255,255,255,0.86);
      line-height: 1.15;
    }

    .answer.correct{
      background: var(--correct);
      border-color: var(--correct-border);
    }
    .answer.wrong{
      background: var(--wrong);
      border-color: var(--wrong-border);
    }

    .bottom{
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .bar{
      flex: 1 1 auto;
      height: 8px;
      border-radius: 999px;
      background: var(--bar-bg);
      overflow:hidden;
      margin: 0 10px;
      border: 1px solid rgba(255,255,255,0.10);
    }
    .barFill{
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--bar-fill-a), var(--bar-fill-b));
      border-radius: 999px;
    }

    .hintLeft, .hintRight{
      white-space: nowrap;
      user-select:none;
    }

    @media (max-width: 760px){
      .answers{ grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="panel">
      <div class="top">
        <div>
          <div class="brand">Derrick C Byron Cinematic 24/7 Trivia</div>
          <div class="sub" id="metaLine">Loading questions</div>
        </div>

        <div class="chips">
          <div class="chip" id="categoryChip">Category</div>
          <div class="chip" id="counterChip">0 of 0</div>
        </div>
      </div>

      <div class="question" id="questionText">Loading</div>

      <div class="answers" id="answers">
        <div class="answer"><div class="badge">A</div><div class="answerText">Loading</div></div>
        <div class="answer"><div class="badge">B</div><div class="answerText">Loading</div></div>
        <div class="answer"><div class="badge">C</div><div class="answerText">Loading</div></div>
        <div class="answer"><div class="badge">D</div><div class="answerText">Loading</div></div>
      </div>

      <div class="bottom">
        <div class="hintLeft" id="hintLeft">Answer in your head</div>
        <div class="bar"><div class="barFill" id="barFill"></div></div>
        <div class="hintRight" id="hintRight">Reveal soon</div>
      </div>
    </div>
  </div>

  <script src="./questions.js?v=3"></script>
  <script>
    // App logic lives here. questions.js only provides window.TRIVIA_BANK.

    const STORAGE_KEY = "dcbyron_trivia_state_v3";

    const elQ = document.getElementById("questionText");
    const elAnsWrap = document.getElementById("answers");
    const elCat = document.getElementById("categoryChip");
    const elCount = document.getElementById("counterChip");
    const elMeta = document.getElementById("metaLine");
    const elBar = document.getElementById("barFill");

    const letters = ["A","B","C","D"];

    const SETTINGS = {
      thinkMs: 9000,     // time before reveal
      revealMs: 2500,    // time answer stays highlighted
      tickMs: 50
    };

    function mulberry32(seed){
      return function(){
        let t = seed += 0x6D2B79F5;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      }
    }

    function shuffleInPlace(arr, rnd){
      for (let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(rnd() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function loadState(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return null;
        return JSON.parse(raw);
      }catch{
        return null;
      }
    }

    function saveState(state){
      try{
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }catch{}
    }

    function normalizeQuestion(q){
      // Expected shape:
      // { category: "Science", question: "...", answers: ["a","b","c","d"], correct: 2 }
      // We defensively normalize.
      const category = String(q.category || "Trivia").trim() || "Trivia";
      const question = String(q.question || "").trim();
      const answersRaw = Array.isArray(q.answers) ? q.answers.slice(0,4) : [];
      const answers = answersRaw.map(x => String(x).trim());

      // If answers are missing or not 4, fail safe
      if(question.length < 2 || answers.length !== 4 || answers.some(a => a.length < 1)){
        return null;
      }

      let correct = Number.isInteger(q.correct) ? q.correct : 0;
      if(correct < 0 || correct > 3) correct = 0;

      return { category, question, answers, correct };
    }

    function buildRotation(bank){
      const state = loadState();
      const total = bank.length;

      // If state is missing or from a different bank size, reset safely.
      if(!state || state.total !== total || !Array.isArray(state.order) || state.order.length !== total){
        const seed = Date.now() ^ (Math.random() * 1e9 | 0);
        const rnd = mulberry32(seed);
        const order = Array.from({length: total}, (_, i) => i);
        shuffleInPlace(order, rnd);

        const newState = { total, seed, order, pos: 0 };
        saveState(newState);
        return newState;
      }

      // Guard pos
      if(typeof state.pos !== "number" || state.pos < 0 || state.pos >= total) state.pos = 0;
      return state;
    }

    function getNextQuestion(bank, rot){
      const idx = rot.order[rot.pos];
      rot.pos = (rot.pos + 1) % rot.total;
      saveState(rot);
      return normalizeQuestion(bank[idx]);
    }

    function clearAnswerClasses(){
      const items = elAnsWrap.querySelectorAll(".answer");
      items.forEach(x => {
        x.classList.remove("correct");
        x.classList.remove("wrong");
      });
    }

    function renderQuestion(q, countText){
      elQ.textContent = q.question;
      elCat.textContent = q.category;
      elCount.textContent = countText;

      const items = elAnsWrap.querySelectorAll(".answer");
      items.forEach((node, i) => {
        node.querySelector(".badge").textContent = letters[i];
        node.querySelector(".answerText").textContent = q.answers[i];
      });

      elMeta.textContent = "Automated rotation through full bank";
    }

    let progressTimer = null;

    function runCycle(bank, rot){
      let q = null;

      // Pull until we get a valid normalized question
      for(let tries = 0; tries < 20; tries++){
        const candidate = getNextQuestion(bank, rot);
        if(candidate){
          q = candidate;
          break;
        }
      }

      if(!q){
        elQ.textContent = "Question bank error";
        elMeta.textContent = "Could not load a valid question";
        return;
      }

      const total = rot.total;
      const shown = rot.pos === 0 ? total : rot.pos;
      renderQuestion(q, `${shown} of ${total}`);
      clearAnswerClasses();

      // Progress bar
      if(progressTimer) clearInterval(progressTimer);
      elBar.style.width = "0%";

      const start = Date.now();
      progressTimer = setInterval(() => {
        const elapsed = Date.now() - start;
        const p = Math.min(1, elapsed / SETTINGS.thinkMs);
        elBar.style.width = `${(p * 100).toFixed(2)}%`;
        if(p >= 1) clearInterval(progressTimer);
      }, SETTINGS.tickMs);

      // Reveal
      setTimeout(() => {
        clearInterval(progressTimer);
        elBar.style.width = "100%";

        const items = elAnsWrap.querySelectorAll(".answer");
        items.forEach((node, i) => {
          if(i === q.correct) node.classList.add("correct");
          else node.classList.add("wrong");
        });

        // Next question after reveal window
        setTimeout(() => {
          runCycle(bank, rot);
        }, SETTINGS.revealMs);

      }, SETTINGS.thinkMs);
    }

    function start(){
      const bank = window.TRIVIA_BANK;
      if(!Array.isArray(bank) || bank.length < 50){
        elQ.textContent = "TRIVIA_BANK not found";
        elMeta.textContent = "Check that questions.js loads and defines window.TRIVIA_BANK";
        return;
      }

      const rot = buildRotation(bank);
      runCycle(bank, rot);
    }

    start();
  </script>
</body>
</html>
