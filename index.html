<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Derrick C Byron Cinematic 24/7 Trivia</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    padding:0;
    background:transparent;
    font-family: 'Segoe UI', sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container {
    width:90%;
    max-width:1100px;
    padding:40px;
    border-radius:20px;
    backdrop-filter: blur(20px);
    background: rgba(20,20,30,0.75);
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
    color:white;
}

.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.title {
    font-size:18px;
    letter-spacing:1px;
    opacity:0.7;
}

.category {
    padding:6px 14px;
    background:rgba(255,255,255,0.1);
    border-radius:20px;
    font-size:14px;
}

.question {
    font-size:42px;
    font-weight:700;
    margin:20px 0 30px 0;
}

.answers li {
    list-style:none;
    padding:16px;
    margin:12px 0;
    border-radius:12px;
    background:rgba(255,255,255,0.08);
    font-size:20px;
}

.correct {
    background:rgba(0,255,150,0.25) !important;
}

.progress-bar {
    height:8px;
    border-radius:6px;
    margin-top:30px;
    background:linear-gradient(90deg,#4facfe,#a855f7);
    width:0%;
}
</style>
</head>

<body>

<div class="container">
    <div class="header">
        <div class="title">Derrick C Byron Cinematic 24/7 Trivia</div>
        <div class="category" id="category">Category</div>
    </div>

    <div class="question" id="question">Loading...</div>

    <ul class="answers" id="answers"></ul>

    <div class="progress-bar" id="progress"></div>
</div>

<script src="questions.js"></script>
<script>

let current = 0;
let progressInterval;
const duration = 10000;

function showQuestion() {
    const q = TRIVIA_BANK[current];
    document.getElementById("question").textContent = q.question;
    document.getElementById("category").textContent = q.category;

    const answers = document.getElementById("answers");
    answers.innerHTML = "";

    q.answers.forEach((ans,index)=>{
        const li = document.createElement("li");
        li.textContent = String.fromCharCode(65+index) + ". " + ans;
        answers.appendChild(li);
    });

    startTimer();
}

function startTimer() {
    const progress = document.getElementById("progress");
    progress.style.width = "0%";

    let elapsed = 0;
    clearInterval(progressInterval);

    progressInterval = setInterval(()=>{
        elapsed += 100;
        progress.style.width = (elapsed/duration)*100 + "%";

        if(elapsed >= duration){
            clearInterval(progressInterval);
            revealAnswer();
        }
    },100);
}

function revealAnswer(){
    const items = document.querySelectorAll(".answers li");
    items[TRIVIA_BANK[current].correct].classList.add("correct");

    setTimeout(()=>{
        current = (current + 1) % TRIVIA_BANK.length;
        showQuestion();
    },4000);
}

showQuestion();

</script>

</body>
</html>
