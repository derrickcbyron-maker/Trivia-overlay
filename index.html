<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Derrick C Byron Cinematic 24/7 Trivia</title>
  <style>
    :root{
      --bg: rgba(20, 20, 24, 0.78);
      --panel: rgba(255, 255, 255, 0.10);
      --panel2: rgba(255, 255, 255, 0.08);
      --stroke: rgba(255, 255, 255, 0.12);
      --text: rgba(255, 255, 255, 0.95);
      --muted: rgba(255, 255, 255, 0.72);
      --good: rgba(76, 217, 100, 0.24);
      --bad: rgba(255, 59, 48, 0.22);
      --goodStroke: rgba(76, 217, 100, 0.65);
      --badStroke: rgba(255, 59, 48, 0.60);
      --accent: rgba(160, 120, 255, 0.85);
    }

    html, body{
      height:100%;
      margin:0;
      background: transparent;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color: var(--text);
    }

    body{
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding: 24px;
      box-sizing:border-box;
    }

    .overlay{
      width: min(1200px, 96vw);
      background: var(--bg);
      border: 1px solid var(--stroke);
      border-radius: 18px;
      box-shadow: 0 18px 70px rgba(0,0,0,0.35);
      padding: 18px 18px 14px 18px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .toprow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .brand{
      font-size: 14px;
      letter-spacing: 0.4px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pills{
      display:flex;
      align-items:center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content:flex-end;
    }

    .pill{
      font-size: 12px;
      color: rgba(255,255,255,0.88);
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.14);
      padding: 6px 10px;
      border-radius: 999px;
      line-height: 1;
    }

    .pill.dot{
      display:flex;
      align-items:center;
      gap: 8px;
    }

    .dot i{
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display:inline-block;
      background: rgba(120, 200, 255, 0.95);
      box-shadow: 0 0 12px rgba(120,200,255,0.55);
    }

    .question{
      font-weight: 800;
      letter-spacing: -0.2px;
      font-size: clamp(26px, 3.2vw, 46px);
      line-height: 1.08;
      margin: 0 0 14px 0;
      min-height: 2.2em;
    }

    .answers{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .ans{
      display:flex;
      align-items:center;
      gap: 10px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      padding: 12px 14px;
      min-height: 54px;
      box-sizing:border-box;
      overflow:hidden;
    }

    .badge{
      width: 26px;
      height: 26px;
      border-radius: 9px;
      display:flex;
      align-items:center;
      justify-content:center;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.92);
      font-weight: 800;
      flex: 0 0 auto;
    }

    .text{
      font-size: clamp(14px, 1.35vw, 18px);
      color: rgba(255,255,255,0.92);
      line-height: 1.2;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }

    .ans.correct{
      background: var(--good);
      border-color: var(--goodStroke);
    }

    .ans.wrong{
      background: var(--bad);
      border-color: var(--badStroke);
    }

    .footer{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .barwrap{
      flex: 1 1 auto;
      height: 8px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      overflow:hidden;
    }

    .bar{
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, rgba(120,200,255,0.95), var(--accent));
      border-radius: 999px;
      transition: width 0.12s linear;
    }

    .rightNote{
      min-width: 92px;
      text-align:right;
      white-space: nowrap;
    }
  </style>
</head>

<body>
  <div class="overlay" id="overlay">
    <div class="toprow">
      <div class="brand" id="brand">Derrick C Byron Cinematic 24/7 Trivia</div>
      <div class="pills">
        <div class="pill dot"><i></i><span id="catPill">Category</span></div>
        <div class="pill" id="phasePill">Question</div>
      </div>
    </div>

    <h1 class="question" id="qText">Loading</h1>

    <div class="answers" id="answers">
      <div class="ans"><div class="badge">A</div><div class="text" id="a0"></div></div>
      <div class="ans"><div class="badge">B</div><div class="text" id="a1"></div></div>
      <div class="ans"><div class="badge">C</div><div class="text" id="a2"></div></div>
      <div class="ans"><div class="badge">D</div><div class="text" id="a3"></div></div>
    </div>

    <div class="footer">
      <div>Answer in your head</div>
      <div class="barwrap"><div class="bar" id="bar"></div></div>
      <div class="rightNote" id="rightNote">Reveal soon</div>
    </div>
  </div>

  <script src="./questions.js?v=2"></script>

  <script>
    const QUESTION_MS = 9000;
    const REVEAL_MS = 3000;

    const els = {
      qText: document.getElementById("qText"),
      a: [
        document.getElementById("a0"),
        document.getElementById("a1"),
        document.getElementById("a2"),
        document.getElementById("a3"),
      ],
      answersWrap: document.getElementById("answers"),
      catPill: document.getElementById("catPill"),
      phasePill: document.getElementById("phasePill"),
      bar: document.getElementById("bar"),
      rightNote: document.getElementById("rightNote"),
    };

    const ANSWER_LETTERS = ["A","B","C","D"];

    function mulberry32(seed){
      let a = seed >>> 0;
      return function(){
        a += 0x6D2B79F5;
        let t = Math.imul(a ^ (a >>> 15), 1 | a);
        t ^= t + Math.imul(t ^ (t >>> 7), 61 | t);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function shuffleInPlace(arr, rnd){
      for (let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(rnd() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function normalizeQuestion(q){
      if (!q) return null;
      if (typeof q.question !== "string") return null;
      if (!Array.isArray(q.answers) || q.answers.length !== 4) return null;

      const correct = Number(q.correct);
      if (!Number.isInteger(correct) || correct < 0 || correct > 3) return null;

      const answers = q.answers.map(x => (typeof x === "string" ? x.trim() : ""));
      if (answers.some(x => !x)) return null;

      const dedupe = new Set(answers.map(x => x.toLowerCase()));
      if (dedupe.size !== 4) return null;

      const category = (typeof q.category === "string" && q.category.trim()) ? q.category.trim() : "Trivia";

      return {
        category,
        question: q.question.trim(),
        answers,
        correct
      };
    }

    function buildDeck(){
      const raw = Array.isArray(window.TRIVIA_BANK) ? window.TRIVIA_BANK : [];
      const cleaned = [];
      for (const item of raw){
        const n = normalizeQuestion(item);
        if (n) cleaned.push(n);
      }

      const seed = Math.floor(Date.now() / 60000);
      const rnd = mulberry32(seed);
      shuffleInPlace(cleaned, rnd);

      return cleaned;
    }

    let deck = [];
    let index = 0;

    let progressTimer = null;
    let phaseTimer = null;
    let startTime = 0;

    function clearTimers(){
      if (progressTimer) clearInterval(progressTimer);
      if (phaseTimer) clearTimeout(phaseTimer);
      progressTimer = null;
      phaseTimer = null;
    }

    function setPhase(isQuestion){
      els.phasePill.textContent = isQuestion ? "Question" : "Answer";
      els.rightNote.textContent = isQuestion ? "Reveal soon" : "Answer";
    }

    function clearHighlights(){
      const cards = els.answersWrap.querySelectorAll(".ans");
      cards.forEach(c => c.classList.remove("correct", "wrong"));
    }

    function render(q){
      els.catPill.textContent = q.category;
      els.qText.textContent = q.question;
      for (let i = 0; i < 4; i++){
        els.a[i].textContent = q.answers[i];
      }
    }

    function reveal(q){
      clearHighlights();
      const cards = els.answersWrap.querySelectorAll(".ans");
      cards.forEach((c, i) => {
        if (i === q.correct) c.classList.add("correct");
        else c.classList.add("wrong");
      });
    }

    function step(){
      clearTimers();

      if (!deck.length){
        deck = buildDeck();
        index = 0;
      }

      if (!deck.length){
        els.qText.textContent = "No valid questions loaded";
        els.catPill.textContent = "Error";
        setPhase(true);
        return;
      }

      if (index >= deck.length){
        deck = buildDeck();
        index = 0;
      }

      const q = deck[index];
      index++;

      clearHighlights();
      render(q);
      setPhase(true);

      startTime = Date.now();
      els.bar.style.width = "0%";

      progressTimer = setInterval(() => {
        const t = Date.now() - startTime;
        const pct = Math.min(100, (t / QUESTION_MS) * 100);
        els.bar.style.width = pct.toFixed(2) + "%";
      }, 80);

      phaseTimer = setTimeout(() => {
        clearInterval(progressTimer);
        progressTimer = null;
        els.bar.style.width = "100%";
        setPhase(false);
        reveal(q);

        phaseTimer = setTimeout(() => {
          step();
        }, REVEAL_MS);
      }, QUESTION_MS);
    }

    window.addEventListener("load", () => {
      deck = buildDeck();
      step();
    });
  </script>
</body>
</html>
