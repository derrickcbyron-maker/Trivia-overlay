<!-- index.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Derrick C Byron Cinematic 24/7 Trivia</title>
  <style>
    :root{
      --bg:#0b0e14;
      --card:#141a24cc;
      --stroke:#2a3344;
      --text:#e9edf5;
      --muted:#aab3c2;
      --good:#26d07c;
      --bad:#ff4d4d;
    }
    html,body{height:100%;margin:0;background:transparent;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;}
    body{display:flex;align-items:center;justify-content:center;}
    .wrap{
      width:min(1180px,96vw);
      padding:20px;
    }
    .card{
      background:linear-gradient(135deg, rgba(20,26,36,.92), rgba(20,26,36,.78));
      border:1px solid var(--stroke);
      border-radius:18px;
      box-shadow:0 20px 60px rgba(0,0,0,.35);
      padding:18px 18px 14px;
      backdrop-filter: blur(8px);
    }
    .top{
      display:flex;align-items:flex-start;justify-content:space-between;gap:16px;
      margin-bottom:6px;
    }
    .brand{
      line-height:1.1;
    }
    .brand .title{
      font-weight:800;
      color:var(--text);
      font-size:16px;
    }
    .brand .sub{
      color:var(--muted);
      font-size:12px;
      margin-top:2px;
    }
    .meta{
      display:flex;gap:10px;align-items:center;justify-content:flex-end;flex-wrap:wrap;
    }
    .pill{
      border:1px solid var(--stroke);
      color:var(--muted);
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      background:rgba(10,14,20,.35);
      white-space:nowrap;
    }
    .qtext{
      color:var(--text);
      font-weight:900;
      font-size:48px;
      letter-spacing:-.02em;
      margin:10px 0 14px;
      min-height: 120px; /* reduces resizing */
      display:flex;
      align-items:flex-start;
    }
    .answers{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
      margin-top:8px;
      min-height: 140px; /* reduces resizing */
    }
    .ans{
      border:1px solid var(--stroke);
      border-radius:14px;
      padding:12px 14px;
      display:flex;
      gap:12px;
      align-items:center;
      color:var(--text);
      background:rgba(10,14,20,.25);
      transition: background .2s, border-color .2s, transform .2s;
      min-height: 56px;
    }
    .ans .lbl{
      width:28px;height:28px;border-radius:10px;
      border:1px solid var(--stroke);
      display:grid;place-items:center;
      color:var(--muted);
      font-weight:800;
      background:rgba(10,14,20,.35);
      flex:0 0 auto;
    }
    .ans.good{
      border-color: rgba(38,208,124,.55);
      background: rgba(38,208,124,.12);
    }
    .ans.bad{
      border-color: rgba(255,77,77,.55);
      background: rgba(255,77,77,.10);
    }
    .bottom{
      display:flex;align-items:center;justify-content:space-between;
      gap:14px;margin-top:12px;
    }
    .hint{
      color:var(--muted);
      font-size:12px;
      font-weight:700;
      padding-left:2px;
    }
    .bar{
      flex:1;
      height:10px;
      border-radius:999px;
      border:1px solid var(--stroke);
      overflow:hidden;
      background:rgba(10,14,20,.25);
    }
    .fill{
      height:100%;
      width:0%;
      background: linear-gradient(90deg, #27c7ff, #b86bff, #ff5fd6);
      transition: width .05s linear;
    }
    .status{
      color:var(--muted);
      font-size:12px;
      min-width:92px;
      text-align:right;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div class="brand">
          <div class="title">Derrick C Byron Cinematic 24/7 Trivia</div>
          <div class="sub">Automated rotation through full bank</div>
        </div>
        <div class="meta">
          <div id="catPill" class="pill">Loading</div>
          <div id="countPill" class="pill">0 of 0</div>
        </div>
      </div>

      <div id="qText" class="qtext">Loading</div>

      <div class="answers">
        <div id="a0" class="ans"><div class="lbl">A</div><div class="txt">Loading</div></div>
        <div id="a1" class="ans"><div class="lbl">B</div><div class="txt">Loading</div></div>
        <div id="a2" class="ans"><div class="lbl">C</div><div class="txt">Loading</div></div>
        <div id="a3" class="ans"><div class="lbl">D</div><div class="txt">Loading</div></div>
      </div>

      <div class="bottom">
        <div class="hint">Answer in your head</div>
        <div class="bar"><div id="fill" class="fill"></div></div>
        <div id="status" class="status">Reveal soon</div>
      </div>
    </div>
  </div>

  <!-- IMPORTANT: keep this file in the same folder as index.html -->
  <script src="./questions.js?v=3"></script>

  <script>
    const STORAGE_KEY = "dcbyron_trivia_state_v3";

    const SETTINGS = {
      thinkMs: 9000,
      revealMs: 2500,
      tickMs: 50
    };

    const elQ = document.getElementById("qText");
    const elCat = document.getElementById("catPill");
    const elCount = document.getElementById("countPill");
    const elFill = document.getElementById("fill");
    const elStatus = document.getElementById("status");
    const ansEls = [document.getElementById("a0"),document.getElementById("a1"),document.getElementById("a2"),document.getElementById("a3")];

    function loadState(){
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch { return {}; }
    }
    function saveState(s){
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {}
    }

    function safeBank(){
      const b = window.TRIVIA_BANK;
      if (!Array.isArray(b) || b.length < 200) return null;
      return b;
    }

    function resetAnswerClasses(){
      for (const el of ansEls){
        el.classList.remove("good","bad");
      }
    }

    function renderQuestion(q, idx, total){
      elCat.textContent = q.category || "General";
      elCount.textContent = `${idx} of ${total}`;
      elQ.textContent = q.question;

      const answers = q.answers;
      for (let i=0;i<4;i++){
        ansEls[i].querySelector(".txt").textContent = answers[i];
      }
      resetAnswerClasses();
      elStatus.textContent = "Reveal soon";
      elFill.style.width = "0%";
    }

    function revealAnswer(q){
      for (let i=0;i<4;i++){
        ansEls[i].classList.add(i === q.correct ? "good" : "bad");
      }
      elStatus.textContent = "Revealed";
    }

    function start(){
      const bank = safeBank();
      if (!bank){
        elQ.textContent = "Bank failed to load";
        elCat.textContent = "Error";
        elCount.textContent = "0 of 0";
        elStatus.textContent = "Check questions.js";
        return;
      }

      const total = bank.length;

      let state = loadState();
      let idx = Number.isInteger(state.idx) ? state.idx : 0;
      if (idx < 0 || idx >= total) idx = 0;

      function next(){
        const q = bank[idx];
        const shown = idx + 1;

        renderQuestion(q, shown, total);

        let t = 0;
        const thinkSteps = Math.max(1, Math.floor(SETTINGS.thinkMs / SETTINGS.tickMs));
        const revealSteps = Math.max(1, Math.floor(SETTINGS.revealMs / SETTINGS.tickMs));
        const totalSteps = thinkSteps + revealSteps;

        const timer = setInterval(() => {
          t++;
          const pct = Math.min(100, (t / totalSteps) * 100);
          elFill.style.width = pct + "%";

          if (t === thinkSteps){
            revealAnswer(q);
          }
          if (t >= totalSteps){
            clearInterval(timer);
            idx = (idx + 1) % total;
            saveState({ idx });
            setTimeout(next, 350);
          }
        }, SETTINGS.tickMs);
      }

      next();
    }

    start();
  </script>
</body>
</html>
