<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Derrick C Byron Cinematic 24/7 Trivia</title>
  <style>
    :root{
      --bg:#0b0f14;
      --card:rgba(20,25,33,.72);
      --stroke:rgba(255,255,255,.14);
      --text:rgba(255,255,255,.94);
      --muted:rgba(255,255,255,.68);
      --good:rgba(64, 255, 160,.25);
      --bad:rgba(255, 64, 96,.18);
    }
    html,body{height:100%;margin:0;background:transparent;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    body{display:flex;align-items:center;justify-content:center}
    .wrap{
      width:min(1200px, 92vw);
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:18px;
      padding:18px 18px 14px 18px;
      backdrop-filter: blur(10px);
      color:var(--text);
      box-shadow:0 20px 60px rgba(0,0,0,.35);
    }
    .top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
    }
    .title{
      font-weight:700;
      font-size:16px;
      line-height:1.2;
    }
    .sub{color:var(--muted);font-size:12px;margin-top:2px}
    .chips{display:flex;gap:10px;align-items:center}
    .chip{
      font-size:12px;
      color:var(--muted);
      border:1px solid var(--stroke);
      border-radius:999px;
      padding:6px 10px;
      background:rgba(255,255,255,.04);
      white-space:nowrap;
    }

    .question{
      font-size: clamp(28px, 4.2vw, 54px);
      font-weight:800;
      line-height:1.05;
      letter-spacing:-0.02em;
      margin:6px 0 14px 0;
      min-height: 2.2em; /* prevents resize jump */
      display:flex;
      align-items:flex-end;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px 12px;
      margin-bottom:12px;
    }
    .ans{
      display:flex;
      align-items:center;
      gap:10px;
      padding:14px 14px;
      border:1px solid var(--stroke);
      border-radius:14px;
      background:rgba(255,255,255,.04);
      font-size:16px;
      min-height:54px;
      overflow:hidden;
    }
    .badge{
      width:28px;height:28px;
      border-radius:10px;
      border:1px solid var(--stroke);
      display:flex;align-items:center;justify-content:center;
      color:var(--muted);
      font-weight:700;
      flex:0 0 auto;
      background:rgba(255,255,255,.03);
    }
    .ans.good{background:var(--good);border-color:rgba(64,255,160,.35)}
    .ans.bad{background:var(--bad);border-color:rgba(255,64,96,.30)}
    .ans span{
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      display:block;
      width:100%;
    }

    .bottom{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      color:var(--muted);
      font-size:12px;
    }
    .bar{
      flex:1;
      height:8px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.04);
      overflow:hidden;
    }
    .fill{
      height:100%;
      width:0%;
      background:linear-gradient(90deg, #45c3ff, #b56bff, #ff5bbd);
      transition:width 80ms linear;
    }
    .rightHint{white-space:nowrap}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <div class="title">Derrick C Byron Cinematic 24/7 Trivia</div>
        <div class="sub">Automated rotation through full bank</div>
      </div>
      <div class="chips">
        <div class="chip" id="catChip">Loading</div>
        <div class="chip" id="countChip">0 of 0</div>
      </div>
    </div>

    <div class="question" id="qText">Loading</div>

    <div class="grid" id="answers">
      <div class="ans"><div class="badge">A</div><span>Loading</span></div>
      <div class="ans"><div class="badge">B</div><span>Loading</span></div>
      <div class="ans"><div class="badge">C</div><span>Loading</span></div>
      <div class="ans"><div class="badge">D</div><span>Loading</span></div>
    </div>

    <div class="bottom">
      <div>Answer in your head</div>
      <div class="bar"><div class="fill" id="fill"></div></div>
      <div class="rightHint" id="hint">Reveal soon</div>
    </div>
  </div>

  <!-- IMPORTANT: keep this, this is what loads the 2000 bank -->
  <script src="./questions.js?v=4"></script>

  <script>
    const STORAGE_KEY = "dcbyron_trivia_state_v4";

    const elQ = document.getElementById("qText");
    const elAnsWrap = document.getElementById("answers");
    const elCat = document.getElementById("catChip");
    const elCount = document.getElementById("countChip");
    const elFill = document.getElementById("fill");
    const elHint = document.getElementById("hint");

    const LETTERS = ["A","B","C","D"];

    const SETTINGS = {
      thinkMs: 9000,
      revealMs: 2500,
      tickMs: 50
    };

    function loadState(){
      try{
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      }catch(e){
        return {};
      }
    }
    function saveState(state){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function ensureBank(){
      if (!window.TRIVIA_BANK || !Array.isArray(window.TRIVIA_BANK) || window.TRIVIA_BANK.length < 1000) {
        // If this triggers, you are not loading questions.js correctly
        elQ.textContent = "Bank failed to load";
        elCat.textContent = "Error";
        elCount.textContent = "0 of 0";
        elHint.textContent = "Check questions.js";
        throw new Error("TRIVIA_BANK missing or too small");
      }
    }

    function renderQuestion(q, idx, total){
      elCat.textContent = q.category || "General";
      elCount.textContent = (idx + 1) + " of " + total;
      elQ.textContent = q.question;

      elAnsWrap.innerHTML = "";
      for (let i = 0; i < 4; i++){
        const row = document.createElement("div");
        row.className = "ans";
        row.innerHTML = '<div class="badge">'+LETTERS[i]+'</div><span></span>';
        row.querySelector("span").textContent = q.answers[i] ?? "";
        elAnsWrap.appendChild(row);
      }
    }

    function setRevealStyles(correctIndex){
      const nodes = Array.from(elAnsWrap.children);
      nodes.forEach((n, i) => {
        n.classList.remove("good","bad");
        n.classList.add(i === correctIndex ? "good" : "bad");
      });
    }

    function clearRevealStyles(){
      const nodes = Array.from(elAnsWrap.children);
      nodes.forEach(n => n.classList.remove("good","bad"));
    }

    function start(){
      ensureBank();

      const bank = window.TRIVIA_BANK;
      const order = window.TRIVIA_ORDER && window.TRIVIA_ORDER.length === bank.length
        ? window.TRIVIA_ORDER
        : Array.from({length: bank.length}, (_,i)=>i);

      let state = loadState();
      let pos = Number.isFinite(state.pos) ? state.pos : 0;

      // clamp
      if (pos < 0 || pos >= order.length) pos = 0;

      function nextQuestion(){
        const qIndex = order[pos];
        const q = bank[qIndex];

        // Save last question text for boundary anti-repeat
        try{
          localStorage.setItem("dcbyron_last_question_v4", String(q.question || ""));
        }catch(e){}

        renderQuestion(q, pos, order.length);
        clearRevealStyles();

        // thinking bar
        elHint.textContent = "Reveal soon";
        let t = 0;
        const totalTicks = Math.max(1, Math.floor(SETTINGS.thinkMs / SETTINGS.tickMs));
        const timer = setInterval(() => {
          t++;
          elFill.style.width = (t / totalTicks * 100).toFixed(2) + "%";
          if (t >= totalTicks){
            clearInterval(timer);
            // reveal
            setRevealStyles(q.correct);
            elHint.textContent = "Answer revealed";
            setTimeout(() => {
              // advance
              pos++;
              if (pos >= order.length) pos = 0;
              saveState({ pos });
              elFill.style.width = "0%";
              nextQuestion();
            }, SETTINGS.revealMs);
          }
        }, SETTINGS.tickMs);
      }

      nextQuestion();
    }

    start();
  </script>
</body>
</html>
