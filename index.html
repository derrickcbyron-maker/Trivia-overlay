<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Trivia Overlay</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
    }
    .wrap {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
    }
    .card {
      width: min(1100px, 92vw);
      background: rgba(0,0,0,0.65);
      color: #fff;
      border-radius: 18px;
      padding: 28px 30px;
      box-sizing: border-box;
    }
    .toprow {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }
    .counter {
      font-size: 16px;
      opacity: 0.9;
      white-space: nowrap;
    }
    .question {
      font-size: clamp(22px, 2.4vw, 38px);
      line-height: 1.22;
      min-height: 3.2em; /* keeps layout stable */
      word-break: break-word;
    }
    .hint {
      margin-top: 14px;
      font-size: 14px;
      opacity: 0.85;
    }
    .controls {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
    }
    .btn {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }
    .btn:hover {
      background: rgba(255,255,255,0.18);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="toprow">
        <div class="counter" id="counter">Loading</div>
        <div class="counter" id="status">No repeats</div>
      </div>

      <div class="question" id="question">Loading trivia</div>

      <div class="hint" id="hint">
        Tip: Press Space for next. Press R to reshuffle a fresh run.
      </div>

      <div class="controls">
        <button class="btn" id="nextBtn">Next</button>
        <button class="btn" id="reshuffleBtn">Reshuffle</button>
        <button class="btn" id="resetBtn">Reset to start</button>
      </div>
    </div>
  </div>

  <script>
    /* Step A
       Put your full 3000 questions in the array below
       Keep each entry as a normal sentence string
    */
    const QUESTIONS = [
      "What is the largest planet in our solar system?",
      "Which ocean is the deepest on Earth?",
      "What year did the first human land on the moon?",
      "Which element has the chemical symbol O?",
      "What is the capital of Japan?"
      // Keep adding until you hit 3000
    ];

    /* Step B
       Core settings
    */
    const STORAGE_KEY_ORDER = "trivia_overlay_order_v1";
    const STORAGE_KEY_INDEX = "trivia_overlay_index_v1";

    const $q = document.getElementById("question");
    const $counter = document.getElementById("counter");
    const $status = document.getElementById("status");
    const $next = document.getElementById("nextBtn");
    const $reshuffle = document.getElementById("reshuffleBtn");
    const $reset = document.getElementById("resetBtn");

    function safeParse(json, fallback) {
      try {
        const v = JSON.parse(json);
        return v ?? fallback;
      } catch {
        return fallback;
      }
    }

    function makeOrder(n) {
      const arr = Array.from({ length: n }, (_, i) => i);
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const tmp = arr[i];
        arr[i] = arr[j];
        arr[j] = tmp;
      }
      return arr;
    }

    function loadOrder() {
      const saved = safeParse(localStorage.getItem(STORAGE_KEY_ORDER), null);
      if (Array.isArray(saved) && saved.length === QUESTIONS.length) return saved;
      const fresh = makeOrder(QUESTIONS.length);
      localStorage.setItem(STORAGE_KEY_ORDER, JSON.stringify(fresh));
      return fresh;
    }

    function loadIndex() {
      const raw = localStorage.getItem(STORAGE_KEY_INDEX);
      const idx = raw ? Number(raw) : 0;
      if (!Number.isFinite(idx) || idx < 0) return 0;
      return idx;
    }

    function saveIndex(i) {
      localStorage.setItem(STORAGE_KEY_INDEX, String(i));
    }

    let order = [];
    let idx = 0;

    function render() {
      if (!QUESTIONS.length) {
        $q.textContent = "Add questions to begin";
        $counter.textContent = "0 of 0";
        $status.textContent = "Waiting";
        return;
      }

      if (idx >= order.length) {
        $q.textContent = "Run complete. Press reshuffle to start a new no repeat cycle.";
        $counter.textContent = `${order.length} of ${order.length}`;
        $status.textContent = "Complete";
        return;
      }

      const qIndex = order[idx];
      $q.textContent = QUESTIONS[qIndex];

      $counter.textContent = `${idx + 1} of ${order.length}`;
      $status.textContent = "No repeats";
    }

    function next() {
      if (!QUESTIONS.length) return;
      if (idx >= order.length) return;
      idx += 1;
      saveIndex(idx);
      render();
    }

    function reshuffle() {
      if (!QUESTIONS.length) return;
      order = makeOrder(QUESTIONS.length);
      idx = 0;
      localStorage.setItem(STORAGE_KEY_ORDER, JSON.stringify(order));
      saveIndex(idx);
      render();
    }

    function resetToStart() {
      idx = 0;
      saveIndex(idx);
      render();
    }

    function init() {
      // Basic sanity check
      const cleaned = QUESTIONS
        .map(q => (typeof q === "string" ? q.trim() : ""))
        .filter(q => q.length > 0);

      if (cleaned.length !== QUESTIONS.length) {
        // If there were blank entries, replace the array contents
        QUESTIONS.length = 0;
        for (const q of cleaned) QUESTIONS.push(q);
      }

      order = loadOrder();
      idx = loadIndex();

      // If questions changed size, regenerate order
      if (order.length !== QUESTIONS.length) {
        order = makeOrder(QUESTIONS.length);
        localStorage.setItem(STORAGE_KEY_ORDER, JSON.stringify(order));
        idx = 0;
        saveIndex(idx);
      }

      // Clamp index
      if (idx > order.length) {
        idx = 0;
        saveIndex(idx);
      }

      render();
    }

    $next.addEventListener("click", next);
    $reshuffle.addEventListener("click", reshuffle);
    $reset.addEventListener("click", resetToStart);

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (key === " " || key === "spacebar") {
        e.preventDefault();
        next();
      }
      if (key === "r") reshuffle();
      if (key === "0") resetToStart();
    });

    init();
  </script>
</body>
</html>
