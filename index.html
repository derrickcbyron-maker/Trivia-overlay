<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Derrick C Byron Cinematic 24/7 Trivia</title>
  <style>
    :root{
      --bg:#0b0e14;
      --card:#141a22;
      --card2:#101621;
      --text:#e9eef6;
      --muted:#a9b4c6;
      --line:rgba(255,255,255,.10);
      --good:rgba(95, 225, 165, .22);
      --bad:rgba(255, 95, 110, .18);
      --goodLine:rgba(95, 225, 165, .55);
      --badLine:rgba(255, 95, 110, .50);
    }

    html,body{height:100%; margin:0; background:transparent; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;}
    .wrap{
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      box-sizing:border-box;
    }
    .panel{
      width:min(1200px, 96vw);
      border-radius:18px;
      background:linear-gradient(180deg, rgba(20,26,34,.98), rgba(15,20,29,.98));
      border:1px solid var(--line);
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      overflow:hidden;
    }
    .top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      padding:18px 20px 10px 20px;
    }
    .brand{
      color:var(--muted);
      font-size:14px;
      letter-spacing:.2px;
      line-height:1.2;
    }
    .sub{
      color:rgba(233,238,246,.65);
      font-size:12px;
      margin-top:4px;
    }
    .chips{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:flex-end;
      flex-wrap:wrap;
    }
    .chip{
      color:rgba(233,238,246,.86);
      font-size:12px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      user-select:none;
      white-space:nowrap;
    }

    .q{
      padding:0 20px 10px 20px;
      color:var(--text);
      font-size:44px;
      font-weight:800;
      line-height:1.05;
      letter-spacing:-.6px;
      min-height:96px;
    }

    .answers{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
      padding:10px 20px 16px 20px;
    }
    .ans{
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      padding:14px 14px;
      color:rgba(233,238,246,.92);
      display:flex;
      gap:12px;
      align-items:center;
      font-size:18px;
      min-height:56px;
      box-sizing:border-box;
    }
    .badge{
      width:28px;
      height:28px;
      border-radius:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      font-size:12px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.18);
      flex:0 0 auto;
    }
    .ans.good{
      background:linear-gradient(0deg, var(--good), rgba(255,255,255,.03));
      border-color:var(--goodLine);
    }
    .ans.bad{
      background:linear-gradient(0deg, var(--bad), rgba(255,255,255,.03));
      border-color:var(--badLine);
    }

    .bottom{
      padding:0 20px 18px 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .hint{
      color:rgba(233,238,246,.60);
      font-size:12px;
    }
    .bar{
      flex:1 1 auto;
      height:8px;
      border-radius:999px;
      overflow:hidden;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
    }
    .fill{
      height:100%;
      width:0%;
      background:linear-gradient(90deg, rgba(120,210,255,.85), rgba(200,120,255,.78));
      border-radius:999px;
    }
    .soon{
      color:rgba(233,238,246,.55);
      font-size:12px;
      white-space:nowrap;
    }

    .error{
      padding:14px 20px 18px 20px;
      color:rgba(255,255,255,.90);
      font-size:14px;
      border-top:1px solid var(--line);
      background:rgba(255,95,110,.08);
      display:none;
    }
    .error b{color:rgba(255,95,110,.95)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="top">
        <div>
          <div class="brand">Derrick C Byron Cinematic 24/7 Trivia</div>
          <div class="sub" id="statusLine">Loading questions</div>
        </div>
        <div class="chips">
          <div class="chip" id="catChip">Category</div>
          <div class="chip" id="countChip" style="display:none;">0 of 0</div>
        </div>
      </div>

      <div class="q" id="questionText">Loading</div>

      <div class="answers" id="answers">
        <div class="ans"><div class="badge">A</div><div>Loading</div></div>
        <div class="ans"><div class="badge">B</div><div>Loading</div></div>
        <div class="ans"><div class="badge">C</div><div>Loading</div></div>
        <div class="ans"><div class="badge">D</div><div>Loading</div></div>
      </div>

      <div class="bottom">
        <div class="hint">Answer in your head</div>
        <div class="bar"><div class="fill" id="barFill"></div></div>
        <div class="soon" id="soonText">Reveal soon</div>
      </div>

      <div class="error" id="errorBox"></div>
    </div>
  </div>

  <!-- IMPORTANT: bump v number when you change questions.js so GitHub Pages stops serving old cache -->
  <script src="./questions.js?v=4"></script>

  <script>
    // Settings
    const SETTINGS = {
      thinkMs: 9000,
      revealMs: 2500,
      tickMs: 50
    };

    // Turn this on only if you want viewers to see progress
    const SHOW_COUNTER = true;

    // Bump this when logic changes so old rotation state is discarded
    const STORAGE_KEY = "dcbyron_trivia_state_v4";

    const elQ = document.getElementById("questionText");
    const elAnsWrap = document.getElementById("answers");
    const elCat = document.getElementById("catChip");
    const elCount = document.getElementById("countChip");
    const elBar = document.getElementById("barFill");
    const elSoon = document.getElementById("soonText");
    const elStatus = document.getElementById("statusLine");
    const elErr = document.getElementById("errorBox");

    const letters = ["A","B","C","D"];

    function showError(msg){
      elErr.style.display = "block";
      elErr.innerHTML = "<b>Problem</b><br>" + msg;
      elStatus.textContent = "Error";
    }

    function shuffle(arr){
      for (let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        const t = arr[i]; arr[i] = arr[j]; arr[j] = t;
      }
      return arr;
    }

    function safeParse(json, fallback){
      try { return JSON.parse(json); } catch { return fallback; }
    }

    function buildNewOrder(n){
      const order = Array.from({length:n}, (_,i)=>i);
      shuffle(order);
      return order;
    }

    function getState(n){
      const saved = safeParse(localStorage.getItem(STORAGE_KEY) || "", null);
      if (!saved || !Array.isArray(saved.order) || saved.order.length !== n || typeof saved.pos !== "number"){
        return { order: buildNewOrder(n), pos: 0, lastIndex: -1, cycle: 1 };
      }
      return saved;
    }

    function saveState(state){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function nextQuestion(bank){
      const n = bank.length;
      let state = getState(n);

      // If cycle finished, reshuffle
      if (state.pos >= n){
        state.order = buildNewOrder(n);
        state.pos = 0;
        state.cycle = (state.cycle || 1) + 1;
      }

      // Pick next index
      let idx = state.order[state.pos];

      // Prevent back to back repeat
      if (idx === state.lastIndex && state.pos + 1 < n){
        const swapIdx = state.order[state.pos + 1];
        state.order[state.pos] = swapIdx;
        state.order[state.pos + 1] = idx;
        idx = swapIdx;
      }

      state.pos += 1;
      state.lastIndex = idx;
      saveState(state);

      return {
        q: bank[idx],
        pos: state.pos,
        total: n
      };
    }

    function renderQuestion(q, pos, total){
      elCat.textContent = q.category || "Category";

      if (SHOW_COUNTER){
        elCount.style.display = "";
        elCount.textContent = pos + " of " + total;
      } else {
        elCount.style.display = "none";
      }

      elQ.textContent = q.question || "Question";
      const answers = Array.isArray(q.answers) ? q.answers.slice(0,4) : ["A","B","C","D"];
      const correct = typeof q.correct === "number" ? q.correct : 0;

      elAnsWrap.innerHTML = "";
      for (let i = 0; i < 4; i++){
        const div = document.createElement("div");
        div.className = "ans";
        const b = document.createElement("div");
        b.className = "badge";
        b.textContent = letters[i];
        const t = document.createElement("div");
        t.textContent = answers[i] ?? "";
        div.appendChild(b);
        div.appendChild(t);
        elAnsWrap.appendChild(div);
      }

      return correct;
    }

    function clearHighlights(){
      const items = elAnsWrap.querySelectorAll(".ans");
      items.forEach(x => { x.classList.remove("good"); x.classList.remove("bad"); });
    }

    function reveal(correctIndex){
      const items = elAnsWrap.querySelectorAll(".ans");
      items.forEach((x, i) => {
        if (i === correctIndex) x.classList.add("good");
        else x.classList.add("bad");
      });
    }

    function sleep(ms){
      return new Promise(r => setTimeout(r, ms));
    }

    async function loop(bank){
      elStatus.textContent = "Automated rotation through full bank";
      while (true){
        clearHighlights();
        elBar.style.width = "0%";
        elSoon.textContent = "Reveal soon";

        const { q, pos, total } = nextQuestion(bank);
        const correctIndex = renderQuestion(q, pos, total);

        // Countdown bar
        const start = Date.now();
        while (Date.now() - start < SETTINGS.thinkMs){
          const p = Math.min(1, (Date.now() - start) / SETTINGS.thinkMs);
          elBar.style.width = (p * 100).toFixed(1) + "%";
          await sleep(SETTINGS.tickMs);
        }

        reveal(correctIndex);
        elSoon.textContent = "Answer revealed";

        await sleep(SETTINGS.revealMs);
      }
    }

    // Boot
    (function init(){
      // hard fail fast if questions.js never created the bank
      const waitMs = 2500;
      const t0 = Date.now();

      function check(){
        const bank = window.TRIVIA_BANK;
        if (Array.isArray(bank) && bank.length > 0){
          // sanity check for 2000
          if (bank.length < 500){
            showError("TRIVIA_BANK loaded but looks too small. It is " + bank.length + ". Your questions.js may not be generating the full bank.");
            return;
          }
          loop(bank);
          return;
        }

        if (Date.now() - t0 > waitMs){
          showError("TRIVIA_BANK is not available. That means questions.js did not load or it crashed. Open this URL in a new tab and tell me if it loads or 404s: /Trivia-overlay/questions.js");
          return;
        }

        requestAnimationFrame(check);
      }

      check();
    })();
  </script>
</body>
</html>
